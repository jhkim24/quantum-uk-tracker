name: Scrape & Deploy

on:
  # Weekly: every Monday at 06:00 UTC. Daily would re-scrape identical pages 6/7 times.
  schedule:
    - cron: "0 6 * * 1"
  # Manual trigger from the Actions tab
  workflow_dispatch:
  # Re-deploy on any change to the site or data files
  push:
    branches: [main]
    paths:
      - "site/**"
      - "data/**"
      - ".github/workflows/scrape.yml"

permissions:
  contents: write   # to commit updated data/*.json
  pages: write      # to deploy Pages
  id-token: write   # required by Pages deploy action

# Don't run two scrapes at the same time
concurrency:
  group: "scrape-and-deploy"
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    # Skip the scrape job for plain push events — only run on schedule/manual
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    env:
      # Opt in to Node 24 ahead of GitHub's June 2026 default switch
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        run: python scraper/run.py

      - name: Run discovery
        run: python scraper/discover.py
        # Don't fail the whole workflow if discovery breaks
        continue-on-error: true

      - name: Commit data updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "chore: weekly scrape $(date -u +'%Y-%m-%d')"
            git push
          fi

  build-site:
    runs-on: ubuntu-latest
    # Always run after scrape (or on push when scrape is skipped)
    needs: [scrape]
    if: |
      always() &&
      (needs.scrape.result == 'success' || needs.scrape.result == 'skipped')
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout (latest, including any new commit from scrape job)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Assemble site bundle
        run: |
          mkdir -p _site
          cp -r site/* _site/
          mkdir -p _site/data
          cp data/*.json _site/data/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build-site
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
